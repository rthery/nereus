<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d2d4a"/>
    </linearGradient>
    <linearGradient id="wave-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22b8cf"/>
      <stop offset="100%" stop-color="#38d9f5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Nereus diver icon — original 24×24 coords scaled to fit in ~380px centered -->
  <!-- Scale factor: 380/24 ≈ 15.83, then center: (512 - 380) / 2 = 66 -->
  <g transform="translate(66, 70) scale(15.83)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Wave (cyan gradient via solid color) -->
    <path d="M3 15c3-3 6-3 9 0s6 3 9 0"
          stroke="url(#wave-grad)" stroke-width="1.8"/>
    <!-- Body, arms — white -->
    <line x1="12" y1="15" x2="12" y2="6"
          stroke="#ffffff" stroke-width="1.8"/>
    <polyline points="9 9 12 6 15 9"
          stroke="#ffffff" stroke-width="1.8"/>
    <line x1="9" y1="9" x2="9" y2="6"
          stroke="#ffffff" stroke-width="1.8"/>
    <line x1="15" y1="9" x2="15" y2="6"
          stroke="#ffffff" stroke-width="1.8"/>
  </g>
</svg>
